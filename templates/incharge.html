<!DOCTYPE html>
<html>
<head>
    <title>Incharge Dashboard</title>
    <style>
        body { font-family: Arial; background: #f2f2f2; }
        .box { width: 400px; margin: auto; background: white; padding: 20px; border-radius: 10px; }
        h2 { text-align: center; }
        input, select, button { width: 100%; padding: 10px; margin-top: 10px; }
        button { background: green; color: white; border: none; }
    </style>
</head>
<body>

<div class="box">
    <h2>Incharge Dashboard</h2>

    <a href="/logout">Logout</a>

    <h3>Add Record</h3>
    <form method="POST" action="/add_record">
        <select name="type">
            <option value="income">Income</option>
            <option value="expense">Expense</option>
        </select>

        <input type="number" name="amount" placeholder="Amount" required>
        <input type="text" name="description" placeholder="Description" required>

        <button>Add</button>
    </form>

    <h3>Reports</h3>
    <p>Total Income: ₹{{ total_income }}</p>
    <p>Total Expense: ₹{{ total_expense }}</p>

    <h3>Records</h3>
    <ul>
        {% for r in records %}
            <li>{{ r[1] }} - ₹{{ r[2] }} - {{ r[3] }}</li>
        {% endfor %}
    </ul>
</div>

</body>
</html>
